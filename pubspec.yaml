name: torneo_futbol_app
description: App mobile white-label para torneos de fútbol amateur.
publish_to: 'none'
version: 1.3.1+21

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.3.0
  intl: ^0.18.0
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.5
  webview_flutter: ^4.2.2
  flutter_riverpod: ^2.6.0
  package_info_plus: ^8.0.0
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1
  flutter_widget_from_html_core: ^0.15.2
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/marianista/
    - assets/images/facundo/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/roboto/static/Roboto-Regular.ttf
        - asset: assets/fonts/roboto/static/Roboto-Bold.ttf
          weight: 700

# Per-flavor launcher icons.
# Generate with:
#   flutter pub run flutter_launcher_icons:main --flavor marianista
#   flutter pub run flutter_launcher_icons:main --flavor facundo
flutter_launcher_icons:
  # Default fallback (used when no --flavor is specified)
  android: true
  ios: true
  image_path: "assets/images/marianista/app_logo.png"
  remove_alpha_ios: true

flutter_launcher_icons_marianista:
  android: true
  ios: true
  image_path: "assets/images/marianista/app_logo.png"
  remove_alpha_ios: true

flutter_launcher_icons_facundo:
  android: true
  ios: true
  # TODO: replace placeholder with real Facundo logo before release
  image_path: "assets/images/facundo/app_logo.png"
  remove_alpha_ios: true
